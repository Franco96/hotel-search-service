version: '3.8'

services:
  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: oracle-db
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: password
      ORACLE_DATABASE: hotel_db
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      retries: 20
    volumes:
      - oracle_data:/opt/oracle/oradata

  # Usamos Apache Kafka oficial (Sin Zookeeper = Menos RAM y más rápido)
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://:29092,CONTROLLER://:9093,EXTERNAL://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      retries: 5

  app:
    build: .
    container_name: hotel-search-service
    ports:
      - "8081:8081"
    depends_on:
      oracle:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DB_URL: jdbc:oracle:thin:@oracle:1521/hotel_db
      DB_USERNAME: system
      DB_PASSWORD: password
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092

volumes:
  oracle_data:
